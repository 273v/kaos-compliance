# Cron-driven snapshot + render + deploy for kaos-compliance.
#
# Three schedules, each in its own job with an independent concurrency
# group so they queue (not cancel) when fire-times collide.
#
#   - hourly   (light)    — refresh CI / Security / identity / open_prs
#   - 4-hourly (security) — full sweep, supply_chain re-checked for
#                           attestation freshness, governance skipped
#   - daily    (full)     — full sweep + LLM diary (when key present)
#
# Cost / failure budget
# ---------------------
# Every job is bounded by timeout-minutes: 30. The deploy step is gated
# on `if: success()` so a failed collect/render never publishes a
# half-built _site. The snapshot artifact is uploaded with
# `if: always()` so forensics survive a failed run. No automatic
# retries — re-run-from-failed-step is a maintainer decision.
#
# Light vs. full: collector CLI surface
# -------------------------------------
# The snapshot CLI today accepts only `--module`, `--output`, and
# `--pretty`. There is no `--no-supply-chain` / `--no-governance`
# switch and adding one would require modifying `collector/snapshot.py`,
# which this change set is not authorised to do. The three schedules
# therefore run the same collector binary. The differentiator is the
# `heartbeat.json` schedule label (written post-render) which the
# dashboard's freshness widget already reads, and the LLM-diary step
# which only the 24h job carries. When the collector grows a
# light-profile switch, only the `Collect` step here needs to change.
#
# Secrets
# -------
# Only `secrets.GITHUB_TOKEN` (the default repo-scoped token) is used
# for the deploy. `secrets.ANTHROPIC_API_KEY` is optional; when unset,
# the daily diary step is skipped at the workflow level rather than
# relying on collector-side `skipped=True` semantics (which do not
# exist yet — see the comment block above).

name: Sweep

on:
  schedule:
    # Hourly light sweep.
    - cron: "0 * * * *"
    # Every 4 hours: security-oriented refresh.
    - cron: "0 */4 * * *"
    # Daily UTC midnight: full sweep + diary.
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      profile:
        description: "Which sweep profile to run when triggered manually."
        required: true
        default: "full"
        type: choice
        options:
          - light
          - security
          - full

permissions:
  contents: write     # required to push gh-pages
  pages: read
  id-token: write     # reserved for future sigstore / Rekor calls

jobs:
  # ────────────── hourly light sweep ──────────────
  light:
    name: Sweep (light, 1h)
    if: >-
      github.event.schedule == '0 * * * *' ||
      (github.event_name == 'workflow_dispatch' && inputs.profile == 'light')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: sweep-light
      cancel-in-progress: false
    env:
      SWEEP_PROFILE: light
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev --python 3.13

      - name: Collect snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/snapshots
          uv run python -m collector.snapshot \
            --output data/snapshots/latest.json \
            --pretty

      # P7: preserve the rolling 90-day history across the keep_files:false
      # deploy. We fetch the existing gh-pages tree (best-effort — the
      # very first deploy has nothing to fetch and the step is a no-op),
      # then copy api/v1/history/ + api/v1/history.json into _site/ so
      # the renderer's history-append step appends to the existing files
      # rather than starting from a one-day window every sweep.
      - name: Restore history from gh-pages
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf _site
          mkdir -p _site/api/v1/history
          tmp_pages=$(mktemp -d)
          git clone --depth=1 --branch gh-pages \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${tmp_pages}" 2>/dev/null || true
          if [ -d "${tmp_pages}/api/v1/history" ]; then
            cp -a "${tmp_pages}/api/v1/history/." _site/api/v1/history/ || true
          fi
          if [ -f "${tmp_pages}/api/v1/history.json" ]; then
            cp "${tmp_pages}/api/v1/history.json" _site/api/v1/history.json || true
          fi
          rm -rf "${tmp_pages}"
          echo "Restored history files:"
          ls -la _site/api/v1/history/ 2>/dev/null || echo "(none yet)"

      - name: Render dashboard
        run: |
          uv run python -m render \
            --snapshot data/snapshots/latest.json \
            --output _site

      # ── R4 + R23: integrity layer ──
      #
      # Sign _site/api/v1/snapshot.json with a keyless sigstore
      # signature (cosign + GitHub OIDC), and re-render once so the
      # signature pill on the index header flips from gray to green
      # using the freshly-attached bundle. The render step is cheap
      # (~1s for 16 modules) and idempotent, so the cost of the
      # second pass is acceptable.
      #
      # The JSON Schema (R23) is emitted by the first render pass
      # above — see collector/schema.py + render/__main__.py.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign snapshot (keyless, GitHub OIDC)
        env:
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          bash scripts/_ci/sign-snapshot.sh \
            _site/api/v1/snapshot.json \
            _site/api/v1/snapshot.sig

      - name: Re-render with signature attached
        run: |
          uv run python -m render \
            --snapshot data/snapshots/latest.json \
            --output _site

      - name: Tag heartbeat with schedule + git sha
        env:
          SCHEDULE_LABEL: "1h"
          GIT_SHA: ${{ github.sha }}
        run: bash scripts/_ci/tag-heartbeat.sh _site/heartbeat.json

      - name: Upload snapshot artifact (forensics)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snapshot-light-${{ github.run_id }}
          path: data/snapshots/latest.json
          retention-days: 14

      - name: Deploy to gh-pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          keep_files: false
          commit_message: "sweep(light): ${{ github.sha }}"
          user_name: "kaos-compliance-bot"
          user_email: "kaos-compliance-bot@users.noreply.github.com"

  # ────────────── 4-hourly security refresh ──────────────
  security:
    name: Sweep (security, 4h)
    if: >-
      github.event.schedule == '0 */4 * * *' ||
      (github.event_name == 'workflow_dispatch' && inputs.profile == 'security')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: sweep-security
      cancel-in-progress: false
    env:
      SWEEP_PROFILE: security
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev --python 3.13

      - name: Collect snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/snapshots
          uv run python -m collector.snapshot \
            --output data/snapshots/latest.json \
            --pretty

      # P7: preserve the rolling 90-day history across the keep_files:false
      # deploy. We fetch the existing gh-pages tree (best-effort — the
      # very first deploy has nothing to fetch and the step is a no-op),
      # then copy api/v1/history/ + api/v1/history.json into _site/ so
      # the renderer's history-append step appends to the existing files
      # rather than starting from a one-day window every sweep.
      - name: Restore history from gh-pages
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf _site
          mkdir -p _site/api/v1/history
          tmp_pages=$(mktemp -d)
          git clone --depth=1 --branch gh-pages \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${tmp_pages}" 2>/dev/null || true
          if [ -d "${tmp_pages}/api/v1/history" ]; then
            cp -a "${tmp_pages}/api/v1/history/." _site/api/v1/history/ || true
          fi
          if [ -f "${tmp_pages}/api/v1/history.json" ]; then
            cp "${tmp_pages}/api/v1/history.json" _site/api/v1/history.json || true
          fi
          rm -rf "${tmp_pages}"
          echo "Restored history files:"
          ls -la _site/api/v1/history/ 2>/dev/null || echo "(none yet)"

      - name: Render dashboard
        run: |
          uv run python -m render \
            --snapshot data/snapshots/latest.json \
            --output _site

      # ── R4 + R23: integrity layer ──
      #
      # Sign _site/api/v1/snapshot.json with a keyless sigstore
      # signature (cosign + GitHub OIDC), and re-render once so the
      # signature pill on the index header flips from gray to green
      # using the freshly-attached bundle. The render step is cheap
      # (~1s for 16 modules) and idempotent, so the cost of the
      # second pass is acceptable.
      #
      # The JSON Schema (R23) is emitted by the first render pass
      # above — see collector/schema.py + render/__main__.py.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign snapshot (keyless, GitHub OIDC)
        env:
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          bash scripts/_ci/sign-snapshot.sh \
            _site/api/v1/snapshot.json \
            _site/api/v1/snapshot.sig

      - name: Re-render with signature attached
        run: |
          uv run python -m render \
            --snapshot data/snapshots/latest.json \
            --output _site

      - name: Tag heartbeat with schedule + git sha
        env:
          SCHEDULE_LABEL: "4h"
          GIT_SHA: ${{ github.sha }}
        run: bash scripts/_ci/tag-heartbeat.sh _site/heartbeat.json

      - name: Upload snapshot artifact (forensics)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snapshot-security-${{ github.run_id }}
          path: data/snapshots/latest.json
          retention-days: 30

      - name: Deploy to gh-pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          keep_files: false
          commit_message: "sweep(security): ${{ github.sha }}"
          user_name: "kaos-compliance-bot"
          user_email: "kaos-compliance-bot@users.noreply.github.com"

  # ────────────── daily full sweep ──────────────
  full:
    name: Sweep (full, 24h)
    if: >-
      github.event.schedule == '0 0 * * *' ||
      (github.event_name == 'workflow_dispatch' && inputs.profile == 'full')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: sweep-full
      cancel-in-progress: false
    env:
      SWEEP_PROFILE: full
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies (with optional llm extra when API key present)
        env:
          HAS_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          if [ "${HAS_ANTHROPIC_KEY}" = "true" ]; then
            uv sync --group dev --extra llm --python 3.13
          else
            uv sync --group dev --python 3.13
          fi

      - name: Collect snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/snapshots
          uv run python -m collector.snapshot \
            --output data/snapshots/latest.json \
            --pretty

      - name: Generate LLM diary
        # Only runs when the optional API key is configured. The diary
        # collector is invoked as a best-effort module: a failure here
        # MUST NOT block the deploy of the rest of the snapshot, hence
        # `continue-on-error: true`. The renderer reads whatever JSON
        # exists under data/diary/ and degrades gracefully when empty.
        #
        # Note: the `secrets` context is NOT available in step-level
        # `if:` expressions, so we surface the key as an env var first
        # and gate on the env var. (Direct `secrets.*` in `if:`
        # crashes the workflow with a YAML parse error at dispatch
        # time — that's what broke every sweep after PR #7.)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        if: env.ANTHROPIC_API_KEY != ''
        continue-on-error: true
        run: |
          mkdir -p data/diary
          if uv run python -c "import importlib; importlib.import_module('collector.diary')" 2>/dev/null; then
            uv run python -m collector.diary --output "data/diary/$(date -u +%Y-%m-%d).json"
          else
            echo "collector.diary not yet wired — skipping (see docs/METHODOLOGY.md §Cadence)."
          fi

      # P7: preserve the rolling 90-day history across the keep_files:false
      # deploy. We fetch the existing gh-pages tree (best-effort — the
      # very first deploy has nothing to fetch and the step is a no-op),
      # then copy api/v1/history/ + api/v1/history.json into _site/ so
      # the renderer's history-append step appends to the existing files
      # rather than starting from a one-day window every sweep.
      - name: Restore history from gh-pages
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf _site
          mkdir -p _site/api/v1/history
          tmp_pages=$(mktemp -d)
          git clone --depth=1 --branch gh-pages \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${tmp_pages}" 2>/dev/null || true
          if [ -d "${tmp_pages}/api/v1/history" ]; then
            cp -a "${tmp_pages}/api/v1/history/." _site/api/v1/history/ || true
          fi
          if [ -f "${tmp_pages}/api/v1/history.json" ]; then
            cp "${tmp_pages}/api/v1/history.json" _site/api/v1/history.json || true
          fi
          rm -rf "${tmp_pages}"
          echo "Restored history files:"
          ls -la _site/api/v1/history/ 2>/dev/null || echo "(none yet)"

      - name: Render dashboard
        run: |
          uv run python -m render \
            --snapshot data/snapshots/latest.json \
            --output _site

      # ── R4 + R23: integrity layer ──
      #
      # Sign _site/api/v1/snapshot.json with a keyless sigstore
      # signature (cosign + GitHub OIDC), and re-render once so the
      # signature pill on the index header flips from gray to green
      # using the freshly-attached bundle. The render step is cheap
      # (~1s for 16 modules) and idempotent, so the cost of the
      # second pass is acceptable.
      #
      # The JSON Schema (R23) is emitted by the first render pass
      # above — see collector/schema.py + render/__main__.py.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign snapshot (keyless, GitHub OIDC)
        env:
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          bash scripts/_ci/sign-snapshot.sh \
            _site/api/v1/snapshot.json \
            _site/api/v1/snapshot.sig

      - name: Re-render with signature attached
        run: |
          uv run python -m render \
            --snapshot data/snapshots/latest.json \
            --output _site

      - name: Tag heartbeat with schedule + git sha
        env:
          SCHEDULE_LABEL: "24h"
          GIT_SHA: ${{ github.sha }}
        run: bash scripts/_ci/tag-heartbeat.sh _site/heartbeat.json

      - name: Upload snapshot artifact (forensics)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snapshot-full-${{ github.run_id }}
          path: |
            data/snapshots/latest.json
            data/diary/
          retention-days: 90

      - name: Deploy to gh-pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          keep_files: false
          commit_message: "sweep(full): ${{ github.sha }}"
          user_name: "kaos-compliance-bot"
          user_email: "kaos-compliance-bot@users.noreply.github.com"
