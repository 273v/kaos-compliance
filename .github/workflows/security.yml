name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks (Docker, no license required)
        run: |
          docker run --rm -v "${GITHUB_WORKSPACE}:/repo" -w /repo \
            zricethezav/gitleaks:v8.30.1 detect \
            --source /repo \
            --redact \
            --no-banner \
            --verbose \
            --exit-code 1

  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --group dev --python 3.13

      - name: Export installed dependency set to requirements.txt
        run: uv export --no-hashes --no-emit-project --format requirements-txt > /tmp/requirements.txt

      - name: Run pip-audit
        run: |
          uvx --python 3.13 --from pip-audit pip-audit \
            --requirement /tmp/requirements.txt \
            --strict

  bandit:
    name: bandit (static security)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: security-bandit-py3.13

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Run bandit
        run: |
          uvx --python 3.13 bandit \
            --recursive \
            --skip B101,B404,B603,B607 \
            --severity-level medium \
            --confidence-level medium \
            collector render scripts
