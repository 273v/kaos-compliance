# kaos-compliance license allowlist
#
# Public, version-controlled list of license exceptions. The dashboard
# reads this file every sweep and re-classifies pills accordingly:
#
#   - A component whose SPDX matches an entry below renders as a
#     GREEN-WITH-ASTERISK pill, with the asterisk linking to the
#     public rationale on /license-policy.html.
#   - A component whose SPDX does NOT match continues to render
#     yellow / red / unknown per the normal class rules.
#
# This file is the SOURCE OF TRUTH. The audit at
# docs/LICENSE-AUDIT.md must stay in sync. CI fails if a policy entry
# lacks a matching audit row or if an audit row's ALLOW disposition
# isn't reflected here.
#
# Schema:
#
#   policy_version: semver-ish, bumped on schema change.
#   last_reviewed:  YYYY-MM-DD of the last review pass.
#   reviewers:      list of GitHub usernames who reviewed.
#   allowed_expressions: list of policy exceptions. Each entry MUST
#     have:
#       spdx:        SPDX expression to allowlist. May be a single
#                    license (e.g., "MPL-2.0") or a compound
#                    expression (e.g., "MPL-2.0 AND MIT").
#       components:  list of component names this entry covers.
#                    Entries are name-scoped, not blanket — a single
#                    "MPL-2.0" allowlist line covers ONLY the named
#                    components, not every MPL-2.0 dep we might pick
#                    up later.
#       rationale:   free-text public justification. Will be rendered
#                    verbatim on /license-policy.html.
#       review_date: YYYY-MM-DD of last review of THIS entry.
#       audit_ref:   anchor in docs/LICENSE-AUDIT.md (e.g., "A.1").
#

policy_version: "1.0"
last_reviewed: "2026-05-11"
reviewers:
  - mjbommar

allowed_expressions:

  - spdx: "MPL-2.0"
    components: ["certifi", "webpki-roots"]
    audit_ref: "A.1"
    review_date: "2026-05-11"
    rationale: >
      certifi ships the Mozilla CA bundle as cacert.pem plus a 30-line
      Python wrapper. MPL-2.0 is file-scoped (MPL-2.0 §3.3):
      obligations attach to the modified file, not the consuming
      codebase. We ship cacert.pem unmodified. This is the same posture
      requests, httpx, urllib3, aiohttp, boto3 take; Mozilla's own
      MPL FAQ confirms this interpretation. Standard enterprise
      legal-review outcome.

  - spdx: "MPL-2.0 AND MIT"
    components: ["tqdm"]
    audit_ref: "A.2"
    review_date: "2026-05-11"
    rationale: >
      tqdm is dual-licensed. The MPL-2.0 component is file-scoped to
      a single source file (the sub-interval feature) which we do not
      modify. The MIT track covers the entire public API. Used by
      ~5B downloads across the Python ecosystem with this posture.

  - spdx: "MPL-2.0"
    components: ["r-efi"]
    audit_ref: "A.3"
    review_date: "2026-05-11"
    rationale: >
      r-efi is a UEFI bindings crate pulled transitively by getrandom
      only on UEFI targets. Our wheel matrix builds for linux,
      macOS, and Windows — never UEFI — so r-efi is in the resolver
      graph but never compiled into shipped binaries. No practical
      MPL-2.0 obligations attach. A stricter alternative is a
      cargo-deny exclude rule; tracked as future hygiene work.

  - spdx: "MPL-2.0"
    components: ["hypothesis"]
    audit_ref: "A.4"
    review_date: "2026-05-11"
    rationale: >
      hypothesis is a dev/test-only dependency declared in
      [dependency-groups].dev, never in [project].dependencies. A
      consumer who pip-installs kaos-content does not receive
      hypothesis. MPL-2.0 obligations cannot reach a shipped wheel.

  - spdx: "MPL-2.0"
    components: ["option-ext"]
    audit_ref: "A.5"
    review_date: "2026-05-11"
    rationale: >
      option-ext is an 87-line Rust crate adding Option extension
      methods, pulled transitively via dirs → dirs-sys → option-ext.
      We ship it unmodified inside the kaos-nlp-transformers Rust
      binary; MPL-2.0 file-scoped obligations don't propagate. Future
      work: remove the dirs dependency entirely to drop this branch.

