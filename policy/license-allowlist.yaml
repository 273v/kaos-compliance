# Categorical safe-defaults the dashboard treats as green without
# requiring a per-component entry above. Use sparingly — every category
# here weakens the audit trail. Components matched here still show on
# /license-policy.html.
allowed_license_classes:
  - "permissive"

# Categorical hard-fails. Even if a component appears in the allowlist
# above, an SPDX matching one of these classes blocks it. Belt + braces
# against a future allowlist mistake.
blocked_license_classes:
  - "strong-copyleft"
  - "source-available"
